{% extends "base.html" %}
{% block title %}Forgot Password — GenZCampus{% endblock %}

{% block auth_content %}
<style>
  .auth-centered-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    padding: 24px 16px;
  }

  .auth-mini-card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--r-2xl);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }

  .auth-mini-header {
    padding: 32px 32px 24px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .auth-mini-icon {
    width: 56px;
    height: 56px;
    border-radius: var(--r-xl);
    background: var(--clr-primary-light);
    border: 2px solid var(--clr-primary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--clr-primary);
    font-size: 22px;
    margin-bottom: 16px;
  }

  .auth-mini-header h3 {
    font-size: 18px;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 6px;
  }

  .auth-mini-header p {
    font-size: 13.5px;
    color: var(--text-muted);
    margin: 0;
  }

  .auth-mini-body {
    padding: 28px 32px 32px;
  }

  .auth-mini-footer {
    padding: 16px 32px;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .auth-mini-footer a {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    transition: color var(--t-fast);
  }

  .auth-mini-footer a:hover { color: var(--clr-primary); }
</style>

<div class="auth-centered-wrap">
  <div class="auth-mini-card animate-in">

    <div class="auth-mini-header">
      <div class="auth-mini-icon">
        <i class="fas fa-key"></i>
      </div>
      <h3>Forgot Password?</h3>
      <p>Enter your email address and we'll send you a reset code.</p>
    </div>

    <div class="auth-mini-body">
      <form method="POST">
        <div class="mb-4">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" class="form-control" id="email" name="email"
            placeholder="name@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="fas fa-paper-plane me-2"></i>Send Reset Code
        </button>
      </form>
    </div>

    <div class="auth-mini-footer">
      <a href="{{ url_for('login') }}">
        <i class="fas fa-arrow-left me-1"></i>Back to Login
      </a>
    </div>

  </div>
</div>
<script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
{% endblock %}
