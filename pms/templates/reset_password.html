{% extends "base.html" %}
{% block title %}Reset Password — GenZCampus{% endblock %}

{% block auth_content %}
<div class="auth-centered-wrap" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px 16px;">
  <div class="auth-mini-card animate-in" style="width:100%;max-width:420px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r-2xl);box-shadow:var(--shadow-lg);overflow:hidden;">
    <div style="padding:32px 32px 24px;text-align:center;border-bottom:1px solid var(--border);">
      <div style="width:56px;height:56px;border-radius:var(--r-xl);background:var(--clr-primary-light);border:2px solid var(--clr-primary);display:inline-flex;align-items:center;justify-content:center;color:var(--clr-primary);font-size:22px;margin-bottom:16px;">
        <i class="fas fa-lock-open"></i>
      </div>
      <h3 style="font-size:18px;font-weight:800;color:var(--text-main);margin-bottom:6px;">Set New Password</h3>
      <p style="font-size:13.5px;color:var(--text-muted);margin:0;">Enter the OTP sent to your email and your new password.</p>
    </div>
    <div style="padding:28px 32px 32px;">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label" for="otp">OTP Code</label>
          <input type="text" class="form-control text-center" id="otp" name="otp"
            placeholder="000000" maxlength="6" required
            style="font-family:var(--font-code);font-size:22px;letter-spacing:6px;font-weight:700;height:56px;">
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">New Password</label>
          <input type="password" class="form-control" id="password" name="password"
            placeholder="Min 6 characters" required>
        </div>
        <div class="mb-4">
          <label class="form-label" for="confirm_password">Confirm Password</label>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password"
            placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="fas fa-check-circle me-2"></i>Reset Password
        </button>
      </form>
    </div>
    <div style="padding:16px 32px;border-top:1px solid var(--border);text-align:center;">
      <a href="{{ url_for('login') }}" style="font-size:13px;color:var(--text-muted);text-decoration:none;">
        <i class="fas fa-arrow-left me-1"></i>Back to Login
      </a>
    </div>
  </div>
</div>
<script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
{% endblock %}
