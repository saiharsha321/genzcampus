{% extends "base.html" %}
{% block title %}Verify OTP — GenZCampus{% endblock %}

{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px 16px;">
  <div class="animate-in" style="width:100%;max-width:400px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r-2xl);box-shadow:var(--shadow-lg);overflow:hidden;">
    <div style="padding:32px 32px 24px;text-align:center;border-bottom:1px solid var(--border);">
      <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--clr-primary),var(--clr-accent));display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:24px;margin-bottom:16px;box-shadow:0 6px 20px rgba(124,58,237,0.3);">
        <i class="fas fa-shield-alt"></i>
      </div>
      <h3 style="font-size:18px;font-weight:800;color:var(--text-main);margin-bottom:8px;">Email Verification</h3>
      <p style="font-size:13.5px;color:var(--text-muted);">
        We've sent a 6-digit code to<br>
        <strong style="color:var(--clr-primary);">{{ email }}</strong>
      </p>
    </div>
    <div style="padding:28px 32px;">
      <form method="POST">
        <div class="mb-4">
          <label class="form-label text-center w-100">Enter OTP Code</label>
          <input type="text" class="form-control text-center" name="otp"
            placeholder="000000" maxlength="6" required
            style="font-family:var(--font-code);font-size:28px;letter-spacing:8px;font-weight:800;height:64px;border-width:2px;">
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="fas fa-arrow-right me-2"></i>Verify Account
        </button>
      </form>

      <div style="margin-top:24px;display:flex;flex-direction:column;gap:12px;">
        <a href="{{ url_for('resend_otp', user_id=user_id) }}" class="btn btn-outline-primary btn-sm w-100" style="font-weight:600;">
          <i class="fas fa-redo-alt me-2"></i>Resend OTP Code
        </a>
        <a href="{{ url_for('change_email_otp', user_id=user_id) }}" class="btn btn-link btn-sm w-100" style="color:var(--text-muted);text-decoration:none;font-size:12px;">
          <i class="fas fa-edit me-1"></i>Mistyped your email? Change it
        </a>
      </div>

      <p style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:20px;opacity:0.75;">
        Didn't receive the code? Check your Spam folder.
      </p>
    </div>
    <div style="padding:16px 32px;border-top:1px solid var(--border);text-align:center;">
      <a href="{{ url_for('login') }}" style="font-size:13px;color:var(--text-muted);text-decoration:none;">
        <i class="fas fa-arrow-left me-1"></i>Back to Login
      </a>
    </div>
  </div>
</div>
<script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
{% endblock %}
