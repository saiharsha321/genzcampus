{% extends "club/layout.html" %}

{% block title %}Create Event - {{ club.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h4 class="fw-bold mb-4"><i class="fas fa-calendar-plus text-primary me-2"></i> Create New Event</h4>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-600">Event Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Annual Tech Symposium"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3"
                        placeholder="Tell students about the event..."></textarea>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Start Date & Time</label>
                        <input type="datetime-local" name="start_date" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">End Date & Time</label>
                        <input type="datetime-local" name="end_date" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-danger fw-bold">Registration Deadline</label>
                        <input type="datetime-local" name="registration_deadline" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Venue</label>
                    <input type="text" name="venue" class="form-control" placeholder="e.g. Auditorium" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Participation Type</label>
                        <select name="participation_type" class="form-select">
                            <option value="solo">Solo Only</option>
                            <option value="team">Team Only</option>
                            <option value="both">Solo & Team</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Allowed Departments (Multi-select)</label>
                        <div class="border rounded p-2 bg-light" style="max-height: 150px; overflow-y: auto;">
                            {% for dept in departments %}
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="departments"
                                    value="{{ dept.name }}" id="dept_{{ dept.id }}" checked>
                                <label class="form-check-label small" for="dept_{{ dept.id }}">
                                    {{ dept.name }}
                                </label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i> Create Event & Build Form
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
