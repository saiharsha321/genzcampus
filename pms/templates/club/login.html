{% extends "club/layout.html" %}

{% block title %}Club Login - GenZCampus{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center vh-100">
        <div class="col-md-4">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-shield-halved fa-3x text-primary mb-3"></i>
                    <h4>Club Management Portal</h4>
                    <p class="text-muted">Sign in to manage your club</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Club Login ID</label>
                        <input type="text" name="login_id" class="form-control" placeholder="Enter Club ID" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Login to Portal</button>
                    </div>
                </form>

                <div class="mt-4 text-center">
                    <a href="{{ url_for('index') }}" class="text-decoration-none text-muted small">
                        <i class="fas fa-arrow-left me-1"></i> Back to Main Website
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
